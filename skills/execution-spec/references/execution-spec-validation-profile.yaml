# Baseline deterministic profile for markdown-engine.validation@v1.
# This profile only includes rules the current engine can enforce without
# template-specific false positives. Conditional table-or-none paths,
# optional package decomposition, rollout, observability, data handling,
# and semantic milestone adequacy remain review responsibilities until
# markdown-engine supports those grammar features.
syntaxVersion: markdown-engine.validation@v1
documentVersion: 1.0.0
rules:
  - id: document-control.table.columns
    select:
      target: table
      section: Document Control
      header:
        - Field
        - Value
    assert:
      tableColumnsRequired:
        columns:
          - Field
          - Value

  - id: sections.required
    select:
      target: document
    assert:
      sectionsRequired:
        order: strict
        headings:
          - Document Control
          - 0. Execution Summary
          - "Layer 1: Execution Basis"
          - 1. Source Authority and Scope
          - 2. Objectives and Non-Objectives
          - 3. Ownership, Roles, and Decision Points
          - 4. Constraints, Assumptions, and Dependencies
          - "Layer 2: Execution Plan"
          - 5. Evidence-Led Execution Model
          - 6. Change Surface Inventory
          - 7. Agent-Focused Package Decomposition
          - 8. Work Packages and Sequencing
          - 9. Milestone Gates and Manual Verification
          - 10. Execution Controls and Drift Management
          - 11. Data, Schema, Config, and Contract Handling
          - "Layer 3: Validation, Release, and Handoff"
          - 12. Validation and Evidence Plan
          - 13. Review Plan
          - 14. Rollout, Migration, Rollback, and Recovery
          - 15. Observability and Operational Readiness
          - 16. Risks, Questions, Deviations, and Waivers
          - 17. Execution Traceability Matrix
          - 18. Final Execution Gate

  - id: section.status.0
    select:
      target: textSpan
      section: 0. Execution Summary
      textIncludes: "Section status:"
    assert:
      text:
        contains: "Section status:"

  - id: section.status.1
    select:
      target: textSpan
      section: 1. Source Authority and Scope
      textIncludes: "Section status:"
    assert:
      text:
        contains: "Section status:"

  - id: section.status.2
    select:
      target: textSpan
      section: 2. Objectives and Non-Objectives
