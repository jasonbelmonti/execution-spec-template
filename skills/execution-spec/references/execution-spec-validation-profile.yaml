  - id: source.traceability.matrix
    select:
      target: document
    assert:
      references:
        idsFrom:
          section: 1. Source Authority and Scope
          column: ID
          prefix: SRC
        mustAppearIn:
          - 17. Execution Traceability Matrix

  - id: objective.traceability.matrix
    select:
      target: document
    assert:
      references:
        idsFrom:
          section: 2. Objectives and Non-Objectives
          column: ID
          prefix: OBJ
        mustAppearIn:
